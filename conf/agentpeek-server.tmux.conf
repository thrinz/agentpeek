# Config for agentpeek's dedicated tmux server (socket: agentpeek).
# Loaded by the tmux unit / container entrypoint:
#   tmux -L agentpeek -f <this file> start-server
#
# Starting with -f replaces ~/.tmux.conf, so pull the user's config back in
# (the installers make ~/.tmux.conf source conf/agentpeek.tmux.conf, which sets
# status off / scrollback / clipboard for the browser terminal). Then keep the
# server alive even with zero sessions, so we don't need a placeholder session
# and closing the last session never tears the server down.
source-file -q ~/.tmux.conf
set -s exit-empty off
