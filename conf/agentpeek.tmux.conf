# agentpeek tmux settings — sourced from ~/.tmux.conf (installed by setup.sh)

# FR-7.2: effectively unbounded scrollback (bounded only by memory)
set-option -g history-limit 1000000

# Native browser scrollback: disable the alternate screen so tmux output
# flows into the terminal's normal buffer, and turn the status bar off so
# tmux scrolls the full screen (a partial scroll region would discard lines
# instead of pushing them into the browser's scrollback).
set-option -ga terminal-overrides ',xterm*:smcup@:rmcup@'
set-option -g status off

# FR-8.3: keep tmux mouse mode off so xterm.js owns text selection and wheel
set-option -g mouse off

# Let programs inside tmux (Claude Code, copy-mode, etc.) set the clipboard
# via OSC52; the web app's proxy bridges these to the browser clipboard.
set-option -g set-clipboard on
