# Run agentpeek from the published image:
#   Pro/Max subscription (no API key — sign in from the in-app Claude chip):
#     PROJECTS_DIR=~/projects docker compose up -d
#   or with an Anthropic API key for UI (chat) mode:
#     PROJECTS_DIR=~/projects ANTHROPIC_API_KEY=sk-ant-... docker compose up -d
# Build locally instead:  uncomment `build: .` and run  docker compose up -d --build
services:
  agentpeek:
    image: ghcr.io/thrinz/agentpeek:latest
    # build: .
    restart: unless-stopped
    # Bound to localhost ON PURPOSE — agentpeek runs an autonomous agent
    # (bypassPermissions). Expose it over Tailscale, never the public internet:
    #   tailscale serve --bg --https=9443 http://127.0.0.1:8090
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      # UI (chat) mode needs Claude auth, but the API key is OPTIONAL. Leave it
      # unset to use a Pro/Max subscription — sign in from the in-app Claude chip
      # (persists in the ~/.claude volume), or mount your host ~/.claude (below)
      # to reuse an existing login. Set a key here only if you prefer API billing.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional browser login password (hashed). Generate one with:
      #   docker run --rm ghcr.io/thrinz/agentpeek:latest \
      #     python -m app hash-password   # then paste the value below
      # AGENTPEEK_PASSWORD_HASH: "pbkdf2_sha256$..."
    volumes:
      # The agent's working tree — your real projects, edited in place. Override
      # the host path with PROJECTS_DIR=/path docker compose up -d.
      - ${PROJECTS_DIR:-./projects}:/root/projects
      # App state: folders, UI sessions, transcripts, the secrets env file.
      - agentpeek-config:/root/.config/agentpeek
      # Claude auth — persist sign-in across restarts. To reuse your host login
      # instead of an API key, replace this with:  - ~/.claude:/root/.claude
      - agentpeek-claude:/root/.claude

  # Companion viewer for the files the agent produces (md/html/office/code).
  # Optional — remove this service if you don't want it. Its own published image
  # (built from github.com/thrinz/filepeek), serving the SAME projects tree.
  filepeek:
    image: ghcr.io/thrinz/filepeek:latest
    restart: unless-stopped
    # Same posture as agentpeek: localhost-only; expose over Tailscale, e.g.
    #   tailscale serve --bg --https=9444 http://127.0.0.1:8765
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      FILEPEEK_ROOT: /root/projects
      # Optional login password (hashed). Generate one with:
      #   docker run --rm ghcr.io/thrinz/filepeek:latest python app.py hash-password
      # FILEPEEK_PASSWORD_HASH: "pbkdf2_sha256$..."
    volumes:
      # The same projects tree agentpeek edits — browse the output here. Add ':ro'
      # if you want filepeek to be view-only (disables its file edit/upload tools).
      - ${PROJECTS_DIR:-./projects}:/root/projects
      # filepeek state: permlinks, bookmarks, auth.json, backup config.
      - filepeek-state:/root/.config/filepeek

volumes:
  agentpeek-config:
  agentpeek-claude:
  filepeek-state:
