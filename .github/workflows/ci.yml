name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile the Python app
        run: python -m py_compile app/*.py
      - name: Check shell scripts
        run: bash -n setup.sh bin/agentpeek-attach
      - name: Check the frontend parses
        run: node --check static/app.js
